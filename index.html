<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoxxzTech - Redirecionando</title>
    
    <!-- Mantém a sua tag de verificação caso a Monetag peça depois -->
    <meta name="monetag" content="da18a6e6cadf3a8ff13edbba97d80a00">

    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader-container {
            background: #121824;
            border: 1px solid #1f293d;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 320px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #00b4db;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { font-size: 13px; color: #94a3b8; }
    </style>

    <script>
        // Assim que a página abrir, ela espera 1 segundo e joga pro Direct Link
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://omg10.com/4/11209912";
            }, 1000); // 1000 milissegundos = 1 segundo
        };
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <h2>Carregando Anúncio...</h2>
        <p>Você será redirecionado para a nossa central de patrocínios em instantes.</p>
    </div>
</body>
</html>
